version: "3.9"

# Run from the project root:  docker-compose up --build
# Stop:                        docker-compose down
# Stop + remove volumes:       docker-compose down -v

services:
  # ── PostgreSQL (local dev only — use Supabase in production) ──────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: youtube_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/versions/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (job queue) ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/youtube_saas
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: "http://localhost:8501,http://frontend:8501"
      FRONTEND_URL: "http://localhost:8501"
    volumes:
      - job_tmp:/tmp/jobs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── ARQ Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/youtube_saas
      REDIS_URL: redis://redis:6379
      JOBS_TMP_DIR: /tmp/jobs
    volumes:
      - job_tmp:/tmp/jobs
    restart: unless-stopped

  # ── Streamlit Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  job_tmp:
